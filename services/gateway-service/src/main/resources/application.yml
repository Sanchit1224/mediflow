spring:
  application: { name: gateway-service }
  config: { import: "optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}" }
  cloud:
    gateway:
      discovery: { locator: { enabled: true, lower-case-service-id: true } }
      default-filters: [RemoveResponseHeader=Server]
server: { port: 8080, shutdown: graceful }
eureka:
  client: { service-url: { defaultZone: "${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}" } }
management:
  endpoints: { web: { exposure: { include: health,info,prometheus } } }
  endpoint: { health: { probes: { enabled: true } } }
